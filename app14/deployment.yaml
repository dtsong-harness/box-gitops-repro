apiVersion: apps/v1
kind: Deployment
metadata: { name: order-service-14, labels: { app: order-service-14 } }
spec:
  replicas: 1
  selector: { matchLabels: { app: order-service-14 } }
  template:
    metadata: { labels: { app: order-service-14 } }
    spec: { containers: [{ name: order-service, image: nginx:1.27, ports: [{ containerPort: 80 }] }] }
